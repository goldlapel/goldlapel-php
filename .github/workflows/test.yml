name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pcntl, posix, pdo, pdo_pgsql
          tools: composer:v2

      - name: Download goldlapel binary
        # Download the latest release asset from the private goldlapel/goldlapel
        # repo using the org-level RELEASE_TOKEN PAT (same token used by all
        # release-*.yml workflows). Org secret has visibility=ALL, so it
        # propagates to this public wrapper repo's workflow runs.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          LATEST=$(gh release list --repo goldlapel/goldlapel --limit 1 --json tagName -q '.[0].tagName')
          gh release download "$LATEST" --repo goldlapel/goldlapel --pattern "goldlapel-linux-x86_64" --dir /tmp
          chmod +x /tmp/goldlapel-linux-x86_64
          echo "GOLDLAPEL_BINARY=/tmp/goldlapel-linux-x86_64" >> $GITHUB_ENV

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run default PHPUnit suite
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
          GOLDLAPEL_TEST_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: vendor/bin/phpunit --configuration phpunit.xml

      - name: Run Laravel PHPUnit suite
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: vendor/bin/phpunit --configuration phpunit-laravel.xml
